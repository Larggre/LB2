<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список фруктов</title>
    <style>
        body {
            max-width: 400px;
            font-family: sans-serif;
        }
        ol{
            padding: 5px;
        }
        .fruit-list {
            background-color: rgb(255, 144, 144); 
            list-style-type: none;
            counter-reset: item;
        }
        .fruit-list li {
            margin: 8px;
            counter-increment: item;
        }

        .fruit-list li.highlight {
            background-color: rgb(187, 89, 89);
        }


        .fruit-list li::before {
            content: counter(item) "."; 
            background-color: rgb(187, 89, 89);
            width: 20px;
            height: 20px;
            padding: 5px;
        }

        .fruit-list li span {
            display: inline-block;
            background-color: rgb(189, 62, 62);
            height: 20px;
            padding: 5px 10px 5px 10px;
        }
    </style>
</head>
<body>
    <ol class="fruit-list">
        <li class="highlight"><span>Apple</span></li>
        <li class="highlight"><span>Orange</span></li>
        <li class="highlight"><span>Pineapple</span></li>
        <li class="highlight"><span>Pear</span></li>
        <li class="highlight"><span>Cherry</span></li>
    </ol>
</body>
</html>
